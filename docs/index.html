<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>With the Flow</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Header — updates based on active view -->
  <header id="app-header">
    <h1 id="header-title">Day 1</h1>
    <span id="header-subtitle" class="phase-badge">Standard Phase · Days 1–20</span>
  </header>

  <!-- ═══ TODAY VIEW ═══ -->
  <div id="view-today" class="view active">
    <div id="day-picker" class="day-picker"></div>
    <div id="day-content" class="view-content"></div>
  </div>

  <!-- ═══ ALL DAYS VIEW ═══ -->
  <div id="view-all-days" class="view">
    <div id="all-days-grid" class="view-content"></div>
  </div>

  <!-- ═══ GROCERY VIEW ═══ -->
  <div id="view-grocery" class="view">
    <div id="week-tabs" class="week-tabs"></div>
    <div id="grocery-content" class="view-content"></div>
  </div>

  <!-- ═══ INFO VIEW ═══ -->
  <div id="view-info" class="view">
    <div id="info-content" class="view-content"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav id="tab-bar" class="tab-bar">
    <button class="tab active" data-view="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Today</span>
    </button>
    <button class="tab" data-view="all-days">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>All Days</span>
    </button>
    <button class="tab" data-view="grocery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Grocery</span>
    </button>
    <button class="tab" data-view="info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>Info</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
