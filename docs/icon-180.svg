<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A0725C"/>
      <stop offset="100%" stop-color="#8B6350"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#9AAD8A"/>
      <stop offset="100%" stop-color="#7A8B6F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="180" height="180" rx="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Flowing wave/ribbon — represents "flow" -->
  <path d="M 30 105 Q 55 75, 90 90 Q 125 105, 150 80"
        fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 30 120 Q 60 90, 90 105 Q 120 120, 150 95"
        fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small sage leaf accent -->
  <g transform="translate(85, 52) rotate(-15)">
    <path d="M 0 0 Q 8 -18, 0 -32 Q -8 -18, 0 0 Z" fill="url(#leaf)" opacity="0.9"/>
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#5C6B52" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- "wtf" lettering — small, refined, lowercase -->
  <text x="90" y="152"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16"
        font-weight="normal"
        font-style="italic"
        letter-spacing="3"
        fill="rgba(255,255,255,0.7)"
        text-anchor="middle">wtf</text>
</svg>
